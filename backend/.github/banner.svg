<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#111114"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0"/>
      <stop offset="20%" stop-color="#10b981" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#6366f1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#glow1)"/>
  <rect width="1280" height="400" fill="url(#glow2)"/>

  <!-- Faint chart line -->
  <path d="M0 280 L160 250 L240 270 L320 220 L420 240 L520 180 L620 200 L740 140 L860 170 L980 110 L1100 130 L1280 80"
        stroke="url(#line)" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Grid dots -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="80"  cy="80"  r="1.5"/>
    <circle cx="160" cy="80"  r="1.5"/>
    <circle cx="240" cy="80"  r="1.5"/>
    <circle cx="80"  cy="160" r="1.5"/>
    <circle cx="160" cy="160" r="1.5"/>
    <circle cx="240" cy="160" r="1.5"/>
    <circle cx="1040" cy="240" r="1.5"/>
    <circle cx="1120" cy="240" r="1.5"/>
    <circle cx="1200" cy="240" r="1.5"/>
    <circle cx="1040" cy="320" r="1.5"/>
    <circle cx="1120" cy="320" r="1.5"/>
    <circle cx="1200" cy="320" r="1.5"/>
  </g>

  <!-- Logo mark (trending arrow inside rounded square) -->
  <g transform="translate(96 130)">
    <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#logoGrad)"/>
    <path d="M14 44 L26 32 L36 40 L50 22" stroke="#0a0a0c" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="50" cy="22" r="3.2" fill="#0a0a0c"/>
  </g>

  <!-- Wordmark + tagline -->
  <g font-family="Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif" fill="#fff">
    <text x="180" y="180" font-size="56" font-weight="700" letter-spacing="-0.5">StockDesk <tspan fill="#a1a1aa" font-weight="500">Backend</tspan></text>
    <text x="180" y="220" font-size="22" font-weight="400" fill="#a1a1aa">A premium trading-journal API. Auth, trades, journal, real-time data — production-grade.</text>
  </g>

  <!-- Tech chips -->
  <g font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">
    <g transform="translate(180 260)">
      <rect width="90"  height="26" rx="13" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)"/>
      <text x="45" y="17" text-anchor="middle" fill="#c7d2fe">Node + Express</text>
    </g>
    <g transform="translate(280 260)">
      <rect width="78"  height="26" rx="13" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.4)"/>
      <text x="39" y="17" text-anchor="middle" fill="#a7f3d0">MongoDB</text>
    </g>
    <g transform="translate(368 260)">
      <rect width="76"  height="26" rx="13" fill="rgba(244,114,182,0.15)" stroke="rgba(244,114,182,0.4)"/>
      <text x="38" y="17" text-anchor="middle" fill="#fbcfe8">Socket.IO</text>
    </g>
    <g transform="translate(454 260)">
      <rect width="46"  height="26" rx="13" fill="rgba(251,191,36,0.15)" stroke="rgba(251,191,36,0.4)"/>
      <text x="23" y="17" text-anchor="middle" fill="#fde68a">JWT</text>
    </g>
  </g>
</svg>
